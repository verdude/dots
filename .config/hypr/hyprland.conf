$mainMod = SUPER

monitor = DP-1, preferred, 0x0, auto
monitor = DP-2, preferred, auto-left, auto
monitor = DP-3, preferred, auto-up, auto

xwayland {
  force_zero_scaling = true
}

$terminal = kitty
$menu = rofi -show drun
$browser = firefox

# exec-once = waybar & hyprpaper & firefox
# exec-once = fcitx5 -d
exec-once = dunst --startup_notification
exec-once = dbus-update-activation-environment --all
exec-once = busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 10000
exec-once = ~/.config/waybar/launch.sh
exec-once = gammastep -PO 4000
bind = $mainMod, A, exec, firefox & slack & kitty & cursor & spotify-launcher
bind = $mainMod SHIFT, B, exec, $browser --new-window $(secret-tool lookup service capstone)
bind = $mainMod SHIFT, V, exec, $browser --new-window $(secret-tool lookup service kamalaharris)

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
#env = GBM_BACKEND,nvidia-drm
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

cursor {
  no_hardware_cursors = 2
  inactive_timeout = 1
  hide_on_key_press = true
  no_warps = true
}

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    decoration {
    }
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = no
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

bind = $mainMod, code:36, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Escape, exit,
bind = $mainMod, Space, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, N, togglesplit
bind = $mainMod, Tab, focuscurrentorlast
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, G, fullscreen, 1

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod, X, exec, hyprlock

workspace = 1, default:true, monitor:DP-2
workspace = 2, default:false, monitor:DP-2
workspace = 3, default:false, monitor:DP-2
workspace = 4, default:false, monitor:DP-2

workspace = 5, default:true, monitor:DP-3
workspace = 6, default:false, monitor:DP-3
workspace = 7, default:false, monitor:DP-3

workspace = 8, default:false, monitor:DP-1
workspace = 9, default:false, monitor:DP-1
workspace = 10, default:true, monitor:DP-1

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = workspace 1, class:(kitty)
windowrulev2 = workspace 5, class:(Spotify)(.*)
windowrulev2 = workspace 10, class:(Slack)(.*)
windowrulev2 = workspace 4, class:(Cursor)(.*)
